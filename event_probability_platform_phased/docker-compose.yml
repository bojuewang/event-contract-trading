services:
  postgres:
    image: postgres:16
    container_name: prob-postgres
    environment:
      POSTGRES_USER: prob
      POSTGRES_PASSWORD: prob
      POSTGRES_DB: probability
    ports:
      - "5432:5432"
    volumes:
      - prob_pg:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
  redis:
    image: redis:7
    container_name: prob-redis
    ports:
      - "6379:6379"
volumes:
  prob_pg:
